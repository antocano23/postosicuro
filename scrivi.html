<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esprimiti in Anonimato</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f7f6;
            font-family: Arial, sans-serif;
        }

        .box-scrittura {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #007BFF;
        }

        .btn-invia {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-invia:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="box-scrittura">
        <h2>Cosa hai per la testa?</h2>
        <p>Nessuno saprà chi sei. Scrivi la tua frustrazione o come hai superato un momento difficile.</p>

        <form action="https://docs.google.com/forms/d/e/1FAIpQLSdF57GJ497ok-iA-IYgEj3Rq7MaDr9Qryw2bOmdy2Pe832G2Q/formResponse" method="POST" target="_self">
            <textarea name="entry.1691238472" placeholder="Scrivi qui liberamente..." required></textarea>
            <button type="submit" class="btn-invia">Invia Anonimamente</button>
        </form>
    </div>

</body>
</html>
