<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Tavolo - Posto Sicuro</title>
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #38bdf8; text-align: center; }
        
        .ia-container { position: absolute; top: 20px; left: 20px; z-index: 10; }
        #ia-bottone { background-color: #4a90e2; color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer; }

        .scenografia-stanza {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .img-container { flex: 1; min-width: 300px; max-width: 450px; }
        .img-container img { width: 100%; border-radius: 20px; border: 2px solid #334155; }

        .box-chat {
            width: 300px;
            background-color: #f9f9f9;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #000;
            text-align: center;
        }

        .btn-blu {
            display: block; width: 100%; padding: 12px; background-color: #2196f3; 
            color: white; text-align: center; text-decoration: none; border-radius: 5px; font-weight: bold;
        }

        .btn-indietro {
            margin-top: 30px; background-color: #475569; color: white; padding: 12px 25px; 
            border-radius: 5px; text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body>

<div class="ia-container">
    <button id="ia-bottone" onclick="attivaIA()">🤖 Chiedi consiglio al Posto Sicuro</button>
    <div id="risposta-ia" style="display:none; background: #334155; padding: 10px; margin-top: 5px; border-radius: 5px;">
        <p>Ciao! Sono qui, cosa ti passa per la testa oggi?</p>
    </div>
</div>

<h1>Il Tavolo di Posto Sicuro</h1>

<div class="scenografia-stanza">
    <div class="img-container">
        <img src="disegno.png" alt="Stanza Posto Sicuro">
    </div>

    <div class="box-chat">
        <h3 style="margin-top: 0;">Posto Sicuro</h3>
        <p>Scrivi quello che ti passa per la testa. Nessuno saprà chi sei.</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSey6VoZDtGVxQKZF_5acxtBGk8TKEuKBNFvBG6bosZcGk0XEQ/viewform?usp=preview" class="btn-blu">Scrivi un messaggio</a>
    </div>
</div>

<div>
    <a href="index.html" class="btn-indietro">Alzati dal tavolo (Torna indietro)</a>
</div>

<script>
function attivaIA() {
    var r = document.getElementById("risposta-ia");
    r.style.display = (r.style.display === "none") ? "block" : "none";
}
</script>

</body>
</html>
